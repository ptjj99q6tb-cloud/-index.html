<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intersection Controller Mobile</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#0f0f10;
  font-family:Arial;
}

canvas {
  display:block;
}

/* MOBILE HUD */
#hud {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:110px;
  background:rgba(20,20,20,0.9);
  display:flex;
  align-items:center;
  justify-content:space-around;
  color:white;
  z-index:10;
  backdrop-filter: blur(10px);
}

button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:white;
  font-size:14px;
}

/* TOP INFO */
#topbar {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}
</style>
</head>

<body>

<div id="topbar">
  Score: <span id="score">0</span>
</div>

<div id="hud">
  <button onclick="togglePause()">Pause</button>
  <button onclick="toggleLightsMode()">Auto Lights</button>
  <button onclick="reset()">Reset</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ---------------- CAMERA (mobile feel) ----------------
let camX = 0;
let camY = 0;
let zoom = 1;

// drag camera
let dragging = false;
let lastX, lastY;

canvas.addEventListener("mousedown",(e)=>{
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener("mousemove",(e)=>{
  if(!dragging) return;
  camX += (e.clientX-lastX);
  camY += (e.clientY-lastY);
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener("mouseup",()=>dragging=false);

// touch support
canvas.addEventListener("touchstart",(e)=>{
  let t=e.touches[0];
  dragging=true;
  lastX=t.clientX;
  lastY=t.clientY;
});
canvas.addEventListener("touchmove",(e)=>{
  let t=e.touches[0];
  camX += (t.clientX-lastX);
  camY += (t.clientY-lastY);
  lastX=t.clientX;
  lastY=t.clientY;
});
canvas.addEventListener("touchend",()=>dragging=false);

// ---------------- GAME STATE ----------------
let paused=false;
let autoLights=true;
let score=0;

// ---------------- CITY GRID ----------------
const gridSize = 600;
const intersections = [
  {x:0,y:0},
  {x:gridSize,y:0},
  {x:0,y:gridSize},
  {x:gridSize,y:gridSize}
];

// ---------------- TRAFFIC LIGHT ----------------
class Light {
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.phase=0;
    this.timer=0;
  }

  update(){
    this.timer++;

    if(this.timer>200){
      this.phase=(this.phase+1)%2;
      this.timer=0;
    }
  }

  nsGreen(){
    return this.phase===0;
  }

  draw(){
    ctx.fillStyle=this.nsGreen()?"green":"red";
    ctx.beginPath();
    ctx.arc(this.x,this.y,8,0,Math.PI*2);
    ctx.fill();
  }
}

let lights = intersections.map(p=>new Light(p.x,p.y));

// ---------------- VEHICLE ----------------
class Car {
  constructor(x,y,dir){
    this.x=x;
    this.y=y;
    this.dir=dir;
    this.speed=2+Math.random();
    this.size=14;
  }

  update(){
    let l = lights[0];

    let inCross =
      Math.abs(this.x-gridSize/2)<60 &&
      Math.abs(this.y-gridSize/2)<60;

    let stop = !l.nsGreen() && inCross;

    if(!stop){
      if(this.dir==="E") this.x+=this.speed;
      if(this.dir==="W") this.x-=this.speed;
      if(this.dir==="N") this.y-=this.speed;
      if(this.dir==="S") this.y+=this.speed;
    }

    // score when leaving
    if(this.x<-200||this.x>1200||this.y<-200||this.y>1200){
      score++;
      document.getElementById("score").innerText=score;
      this.dead=true;
    }
  }

  draw(){
    ctx.fillStyle="lime";
    ctx.fillRect(this.x,this.y,this.size,this.size);
  }
}

let cars=[];

function spawn(){
  let dirs=["N","S","E","W"];
  let d=dirs[Math.floor(Math.random()*4)];

  let x=gridSize/2;
  let y=gridSize/2;

  cars.push(new Car(x,y,d));
}

setInterval(()=>{ if(!paused) spawn(); },900);

// ---------------- DRAW CITY ----------------
function drawRoads(){
  ctx.fillStyle="#2a2a2a";

  ctx.fillRect(gridSize/2-80,0,160,1200);
  ctx.fillRect(0,gridSize/2-80,1200,160);
}

// ---------------- LOOP ----------------
function loop(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.translate(camX,camY);
  ctx.scale(zoom,zoom);

  drawRoads();

  if(autoLights) lights.forEach(l=>l.update());
  lights.forEach(l=>l.draw());

  cars.forEach(c=>c.update());
  cars.forEach(c=>c.draw());
  cars=cars.filter(c=>!c.dead);

  requestAnimationFrame(loop);
}

loop();

// ---------------- UI ----------------
function togglePause(){ paused=!paused; }
function toggleLightsMode(){ autoLights=!autoLights; }
function reset(){ cars=[]; score=0; }
</script>

</body>
</html>
