<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intersection Controller REAL</title>

<style>
body { margin:0; background:#111; overflow:hidden; font-family:Arial; }
canvas { display:block; }
#ui {
  position:fixed; top:10px; left:10px; color:white; z-index:10;
}
button { padding:8px; margin:4px; border-radius:6px; border:none; }
</style>
</head>

<body>

<div id="ui">
  <button onclick="togglePause()">Pause</button>
  <div>Score: <span id="score">0</span></div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- SIM STATE ----------------
let paused = false;
let score = 0;

// ---------------- ROADS (CENTER CROSS) ----------------
const cx = canvas.width/2;
const cy = canvas.height/2;

const roadWidth = 120;

// ---------------- TRAFFIC LIGHT STATE MACHINE ----------------
let phase = "NS"; // NS, EW, YELLOW
let timer = 0;

// ---------------- WAYPOINTS ----------------
// Cars follow a path instead of free movement
function createPath(dir){
  if(dir === "N"){
    return [{x:cx, y:canvas.height+50},{x:cx,y:cy-roadWidth},{x:cx,-50}];
  }
  if(dir === "S"){
    return [{x:cx, y:-50},{x:cx,y:cy+roadWidth},{x:cx,canvas.height+50}];
  }
  if(dir === "E"){
    return [{x:-50, y:cy},{x:cx-roadWidth,y:cy},{x:canvas.width+50,cy}];
  }
  if(dir === "W"){
    return [{x:canvas.width+50, y:cy},{x:cx+roadWidth,y:cy},{x:-50,cy}];
  }
}

// ---------------- VEHICLE ----------------
class Car {
  constructor(type, dir){
    this.type = type;
    this.path = createPath(dir);
    this.i = 0;
    this.x = this.path[0].x;
    this.y = this.path[0].y;
    this.speed = type==="fast"?3:type==="truck"?1.5:2.2;
    this.size = type==="truck"?26:16;
    this.priority = type==="ambulance";
  }

  currentTarget(){
    return this.path[this.i];
  }

  update(){
    if(this.i >= this.path.length-1){
      score += this.priority ? 5 : 1;
      document.getElementById("score").innerText = score;
      this.dead = true;
      return;
    }

    let t = this.currentTarget();

    let dx = t.x - this.x;
    let dy = t.y - this.y;
    let dist = Math.hypot(dx,dy);

    // ---------------- TRAFFIC LOGIC ----------------
    let inIntersection =
      Math.abs(this.x-cx)<roadWidth &&
      Math.abs(this.y-cy)<roadWidth;

    let blocked =
      !this.priority &&
      inIntersection &&
      ((phase==="NS" && (dx!==0)) || (phase==="EW" && (dy!==0)));

    if(!blocked){
      this.x += (dx/dist)*this.speed;
      this.y += (dy/dist)*this.speed;
    }

    if(dist < 5){
      this.i++;
    }
  }

  draw(){
    ctx.fillStyle =
      this.type==="ambulance"?"white":
      this.type==="truck"?"orange":
      this.type==="fast"?"cyan":"lime";

    ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size);
  }
}

// ---------------- SPAWNING ----------------
let cars = [];

function spawn(){
  const types=["car","car","fast","truck","ambulance"];
  const dirs=["N","S","E","W"];

  cars.push(new Car(
    types[Math.floor(Math.random()*types.length)],
    dirs[Math.floor(Math.random()*4)]
  ));
}

setInterval(()=>{ if(!paused) spawn(); },700);

// ---------------- TRAFFIC LIGHT ENGINE ----------------
function updateLights(){
  timer++;

  if(phase==="NS" && timer>240){
    phase="YELLOW"; timer=0;
  }
  else if(phase==="YELLOW" && timer>60){
    phase="EW"; timer=0;
  }
  else if(phase==="EW" && timer>240){
    phase="YELLOW"; timer=0;
  }
  else if(phase==="YELLOW" && timer>60){
    phase="NS"; timer=0;
  }
}

// ---------------- DRAW ROAD ----------------
function drawRoad(){
  ctx.fillStyle="#333";

  // vertical
  ctx.fillRect(cx-roadWidth,0,roadWidth*2,canvas.height);

  // horizontal
  ctx.fillRect(0,cy-roadWidth,canvas.width,roadWidth*2);
}

// ---------------- DRAW LIGHTS ----------------
function drawLights(){
  ctx.fillStyle = phase==="NS"?"green":"red";
  ctx.fillRect(cx-40,cy-roadWidth-30,10,10);
  ctx.fillRect(cx+30,cy+roadWidth+20,10,10);

  ctx.fillStyle = phase==="EW"?"green":"red";
  ctx.fillRect(cx-roadWidth-30,cy+30,10,10);
  ctx.fillRect(cx+roadWidth+20,cy-40,10,10);
}

// ---------------- LOOP ----------------
function loop(){
  if(!paused) updateLights();

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawRoad();
  drawLights();

  cars.forEach(c=>c.update());
  cars.forEach(c=>c.draw());
  cars = cars.filter(c=>!c.dead);

  requestAnimationFrame(loop);
}

loop();

// ---------------- UI ----------------
function togglePause(){
  paused=!paused;
}
</script>

</body>
</html>
