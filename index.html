<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intersection Controller Lite</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
overflow:hidden;
color:white;
}

#topbar{
position:absolute;
top:10px;
left:10px;
z-index:10;
}

button{
padding:10px;
margin:4px;
font-size:16px;
cursor:pointer;
}

canvas{
display:block;
background:#222;
}

.green{
background:#27ae60;
color:white;
}

.red{
background:#c0392b;
color:white;
}
</style>
</head>
<body>

<div id="topbar">
<h2>Intersection Controller Lite</h2>

<div>Score: <span id="score">0</span></div>

<button onclick="spawnCar()">Spawn Car</button>

<button id="lightBtn"
class="green"
onclick="toggleLight()">
Green Light
</button>

<button onclick="pauseGame()">
Pause / Resume
</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cars = [];
let score = 0;
let paused = false;

let lightGreen = true;

const roadWidth = 120;

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener("resize",resize);

function spawnCar(){

cars.push({
x:-40,
y:canvas.height/2-15,
width:30,
height:15,
speed:2 + Math.random()*2
});

}

function toggleLight(){

lightGreen = !lightGreen;

const btn = document.getElementById("lightBtn");

if(lightGreen){
btn.innerText="Green Light";
btn.className="green";
}
else{
btn.innerText="Red Light";
btn.className="red";
}

}

function pauseGame(){
paused=!paused;
}

function drawRoads(){

ctx.fillStyle="#666";

ctx.fillRect(
canvas.width/2-roadWidth/2,
0,
roadWidth,
canvas.height
);

ctx.fillRect(
0,
canvas.height/2-roadWidth/2,
canvas.width,
roadWidth
);

}

function drawTrafficLight(){

ctx.beginPath();

ctx.arc(
canvas.width/2-90,
canvas.height/2-90,
20,
0,
Math.PI*2
);

ctx.fillStyle =
lightGreen ? "#00ff00" : "#ff0000";

ctx.fill();

}

function updateCars(){

const stopLine = canvas.width/2 - 100;

for(let car of cars){

if(!lightGreen){

if(car.x >= stopLine &&
car.x <= stopLine+10){

continue;
}

}

car.x += car.speed;

}

cars = cars.filter(car=>{

if(car.x > canvas.width+50){

score++;
document.getElementById("score")
.innerText = score;

return false;
}

return true;

});

}

function drawCars(){

for(let car of cars){

ctx.fillStyle="#3498db";

ctx.fillRect(
car.x,
car.y,
car.width,
car.height
);

}

}

function gameLoop(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawRoads();

drawTrafficLight();

if(!paused){
updateCars();
}

drawCars();

requestAnimationFrame(gameLoop);

}

setInterval(()=>{

if(Math.random()<0.7){
spawnCar();
}

},2000);

gameLoop();

</script>

</body>
</html>
